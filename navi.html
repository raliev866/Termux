        let currentPath = '';
        let searchMode = false;
        let isLoading = true;
        let folders = new Set();
        let filesByPath = {};
        
        function showInfo(msg, err) {
            const info = document.getElementById('fileInfo');
            info.style.display = 'block';
            info.style.borderLeftColor = err ? '#ff6b6b' : '#4cc9f0';
            info.innerHTML = (err ? '❌ ' : '✅ ') + msg;
            setTimeout(() => info.style.display = 'none', 3000);
        }
        
        function openFile(url, name, ext) {
            if (!url) { showInfo('Ссылка не найдена', true); return; }
            
            // Типы файлов для скачивания через raw
            const downloadTypes = ['docx', 'doc', 'xlsx', 'pptx', 'pdf', 'zip', 'rar', '7z', 'apk', 'jpg', 'jpeg', 'png', 'gif', 'otf', 'ttf', 'css'];
            
            if (downloadTypes.includes(ext)) {
                const downloadUrl = url.replace('/blob/', '/raw/');
                window.open(downloadUrl, '_blank');
                showInfo('📥 Скачиваю: ' + name, false);
            } else {
                window.open(url, '_blank');
                showInfo('📖 Открываю: ' + name, false);
            }
        }
        
        function buildIndexes() {
            treeData.forEach(item => {
                if (item.type === 'folder') {
                    folders.add(item.path);
                } else {
                    const dir = item.path.lastIndexOf('/') === -1 ? '' : item.path.substring(0, item.path.lastIndexOf('/'));
                    if (!filesByPath[dir]) filesByPath[dir] = [];
                    filesByPath[dir].push(item);
                }
            });
            
            // Обновляем статистику
            try {
                document.querySelector('.stat:nth-child(1) .stat-value').textContent = folders.size;
                document.querySelector('.stat:nth-child(2) .stat-value').textContent = treeData.filter(i => i.type === 'file').length;
            } catch(e) {}
        }
        
        function getFolders(path) {
            const prefix = path ? path + '/' : '';
            const result = new Set();
            folders.forEach(f => {
                if (f.startsWith(prefix)) {
                    const r = f.substring(prefix.length);
                    if (r && !r.includes('/')) result.add(r);
                    else if (r && r.includes('/')) result.add(r.split('/')[0]);
                }
            });
            return Array.from(result).sort();
        }
        
        function render() {
            if (isLoading) return;
            const container = document.getElementById('fileTree');
            const bread = document.getElementById('breadcrumb');
            
            if (searchMode) {
                bread.innerHTML = '<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Поиск';
                return;
            }
            
            if (currentPath) {
                const parts = currentPath.split('/');
                let html = '<a href="#" onclick="setPath(\'\');return false;">🏠 Главная</a>';
                let cum = '';
                parts.forEach(p => {
                    cum += (cum ? '/' : '') + p;
                    html += ` › <a href="#" onclick="setPath('${cum}');return false;">${p}</a>`;
                });
                bread.innerHTML = html;
            } else {
                bread.innerHTML = '🏠 Главная';
            }
            
            const folderList = getFolders(currentPath);
            const fileList = filesByPath[currentPath] || [];
            
            container.innerHTML = '';
            
            folderList.forEach(f => {
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                cdiv.innerHTML = '<span class="folder-icon">📁</span> ' + f;
                cdiv.onclick = () => setPath(currentPath ? currentPath + '/' + f : f);
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            fileList.sort((a,b) => a.path.localeCompare(b.path)).forEach(file => {
                const name = file.path.split('/').pop();
                const ext = name.split('.').pop().toLowerCase();
                let icon = '📄', cls = 'file-icon';
                
                if (ext === 'html' || ext === 'htm') { icon = '🌐'; cls = 'html-icon'; }
                else if (ext === 'md') { icon = '📝'; cls = 'md-icon'; }
                else if (ext === 'docx') { icon = '📘'; cls = 'docx-icon'; }
                else if (ext === 'sh') { icon = '⚙️'; cls = 'file-icon'; }
                else if (['jpg','jpeg','png','gif'].includes(ext)) { icon = '🖼️'; cls = 'file-icon'; }
                else if (['mp3','wav','ogg'].includes(ext)) { icon = '🎵'; cls = 'file-icon'; }
                else if (['mp4','avi','mkv'].includes(ext)) { icon = '🎬'; cls = 'file-icon'; }
                else if (ext === 'pdf') { icon = '📕'; cls = 'file-icon'; }
                else if (ext === 'zip' || ext === 'rar' || ext === '7z') { icon = '🗜️'; cls = 'file-icon'; }
                else if (ext === 'apk') { icon = '📱'; cls = 'file-icon'; }
                else if (name.indexOf('.') === -1) { icon = '🔧'; cls = 'file-icon'; }
                
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                cdiv.innerHTML = `<span class="${cls}">${icon}</span> ${name} <span class="file-size">[${file.size}]</span>`;
                cdiv.onclick = () => openFile(file.url, name, ext);
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            if (!folderList.length && !fileList.length) {
                container.innerHTML = '<div class="no-results">📂 Пусто</div>';
            }
        }
        
        function setPath(p) {
            currentPath = p;
            searchMode = false;
            document.getElementById('searchInput').value = '';
            render();
            history.pushState({path: p}, '');
        }
        
        function resetToRoot() {
            setPath('');
            showInfo('На главную');
        }
        
        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) { resetToRoot(); return; }
            searchMode = true;
            const results = treeData.filter(i => i.path.toLowerCase().includes(term));
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            
            if (!results.length) {
                container.innerHTML = '<div class="no-results">🔍 Ничего не найдено</div>';
                return;
            }
            
            results.sort((a,b) => a.path.localeCompare(b.path)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                let icon = item.type === 'folder' ? '📁' : '📄';
                cdiv.innerHTML = `<span>${icon}</span> ${item.path}`;
                
                if (item.type === 'folder') {
                    cdiv.onclick = () => setPath(item.path);
                } else {
                    const name = item.path.split('/').pop();
                    const ext = name.split('.').pop().toLowerCase();
                    cdiv.onclick = () => openFile(item.url, name, ext);
                }
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            document.getElementById('breadcrumb').innerHTML = '<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Результатов: ' + results.length;
        }
        
        window.onpopstate = e => {
            if (e.state?.path !== undefined) {
                currentPath = e.state.path;
                searchMode = false;
                render();
            }
        };
        
        function init() {
            buildIndexes();
            const pb = document.getElementById('progressFill');
            const pt = document.getElementById('progressText');
            let p = 0;
            const iv = setInterval(() => {
                p += 2;
                pb.style.width = p + '%';
                pt.textContent = 'Загрузка ' + p + '%';
                if (p >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        isLoading = false;
                        document.getElementById('loadingProgress').style.display = 'none';
                        render();
                        showInfo('Готово! ' + treeData.length + ' элементов');
                        history.replaceState({path: ''}, '');
                    }, 300);
                }
            }, 30);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') performSearch();
            });
        });
    </script>
